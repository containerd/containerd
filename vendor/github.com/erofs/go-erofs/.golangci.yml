version: "2"

run:
  timeout: 5m

linters:
  enable:
    - misspell
    - gocritic
    - revive
    - unconvert
    - unparam
  settings:
    revive:
      rules:
        - name: exported
          disabled: true

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/erofs/go-erofs
